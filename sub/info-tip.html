<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>청년꿀팁  | 온통청년</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Pretendard/Pretendard.css">
    <link rel="stylesheet" href="../styles/common.css">
    <link rel="stylesheet" href="../styles/sub/info-tip.css">
    <script src="../scripts/sub/서브페이지명.js" defer></script>
</head>
<body>

    <div class="container">
        <aside id="aside">
            
        </aside><!-- // #aside End -->
        <section id="main">
            <h1>청년꿀팁</h1>

            <!-- 카테고리 -->
            <nav class="tip-category">
                <ul>
                    <li><button>전체</button></li>
                    <li><button>정책소식</button></li>
                    <li><button>쉬운 용어풀이</button></li>
                    <li><button>청년뉴스</button></li>
                </ul>
            </nav>

            <!-- 검색 영역 -->
            <form class="tip-search">
                <fieldset>
                    <legend class="blind">청년꿀팁 검색</legend>

                    <label class="search-label">키워드</label>

                    <select class="search-select">
                        <option>제목</option>
                    </select>

                    <input type="text" class="search-input">

                    <button class="search-reset">초기화</button>
                    <button class="search-submit">검색</button>
                </fieldset>
            </form>

            <!-- 청년꿀팁 목록 -->
            <ul class="tip-list">
                <li class="tip-item">
                    <article class="tip-card">
                        <figure class="tip-img">
                            <img src="" alt="취업애로청년">
                        </figure>

                        <div class="tip-cont">
                            <header class="tip-head">
                                <p class="tip-category-name">카테고리 스펜</p>
                                <button class="tip-share">공유하기버튼</button>
                            </header>

                            <dl class="tip-info">
                                <dt class="tip-title">[취업애로청년]편</dt>
                                <dd class="tip-meta">
                                    <strong>등록일</strong>
                                    2025.11.26
                                </dd>
                                <dd class="tip-meta">
                                    <strong>조회수</strong>
                                    421
                                </dd>
                            </dl>
                        </div>
                    </article>
                </li>
            </ul>

            <div class="pagination"></div>
        </section><!-- // #main End -->
    </div><!-- // .container End -->

</body>
</html>
