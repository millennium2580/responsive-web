<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>청년신문고 | 온통청년</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Pretendard/Pretendard.css">
    <link rel="stylesheet" href="../styles/common.css">
    <link rel="stylesheet" href="../styles/sub/part-report.css">
    <script src="../scripts/sub/서브페이지명.js" defer></script>
</head>
<body>

    <div class="container">
        <aside id="aside">
            
        </aside><!-- // #aside End -->
        <section id="main">
            <h1>청년신문고</h1>

            <!-- 페이지 정보 -->
            <dl class="cont-info">
                <dt>오직 청년들을 위한 청년 신문고</dt>
                <dd>
                    정부 청년정책의 개선 방향, 새로운 청년정책 아이디어 등 
                    청년의 더 나은 삶을 위한 여러분의 의견을 들려주세요.
                </dd>
            </dl>

            <!-- 목록 검색필터 -->
            <form class="board-search" action="" method="post">
                <fieldset>
                    <legend class="blind">청년신문고 검색</legend>

                    <label class="search-label">키워드</label>

                    <select class="search-select">
                        <option>제목</option>
                    </select>

                    <input type="text" class="search-input">

                    <button class="search-reset">초기화</button>
                    <button class="search-submit" type="submit">검색</button>
                </fieldset>
            </form>

            <!-- 목록 필터 -->
            <div class="list-filter">
                <label>
                    <input type="checkbox">
                    마감제외
                    <span class="deadline-toggle"></span>
                </label>
            </div>
    
            <!-- 신문고 목록 -->
            <table class="table-board">
                <caption class="blind">청년신문고 목록</caption>
                <thead class="table-head">
                    <tr>
                        <th>번호</th>
                        <th>공개여부</th>
                        <th>제목</th>
                        <th>등록일</th>
                        <th>상태</th>
                    </tr>
                </thead> 
                <tbody class="table-body">
                    <tr class="board-table-row">
                        <td class="board-num">1</td>
                        <td class="board-lock">
                            <span class="board-label">공개여부</span>
                            <img src="" alt="자물쇠 잠김">
                        </td>
                        <td class="board-title">
                            <span class="board-label">제목</span>
                            온통청년 청년정책 통합검색 기능 개선 제안 드립니다.
                        </td>
                        <td class="board-date">
                            <span class="board-label">등록일</span>
                            2026.04.11
                        </td>
                        <td class="board-state">
                            <span class="board-label">상태</span>
                            답변완료
                        </td>
                    </tr>
                </tbody>
            </table>
            <button class="board-write">의견 작성하기</button>

            <div class="pagination"></div>
        </section><!-- // #main End -->
    </div><!-- // .container End -->
    
</body>
</html>
